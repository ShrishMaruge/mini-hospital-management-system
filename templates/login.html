{% extends "base.html" %}

{% block title %}Login | HMS{% endblock %}

{% block content %}
<div class="card" style="max-width:520px;margin:auto;">
    <h2>{{ role|title }} Login</h2>
    <p class="muted">Enter your username/email and password to continue.</p>

    <form method="post">
        {% csrf_token %}

        <label>Username or Email</label>
        <input type="text" name="identifier" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button class="btn" type="submit" style="width:100%;margin-top:18px;">Login</button>
    </form>

    <p class="muted">
        New here?
        <a href="{% url 'register' role %}">Create {{ role }} account</a>
    </p>
</div>
{% endblock %}
