{% extends "base.html" %}

{% block title %}Verify OTP | HMS{% endblock %}

{% block content %}
<div class="card" style="max-width:520px;margin:auto;">
    <h2>Verify OTP</h2>
    <p class="muted">Enter the 5-digit OTP sent to {{ email }}.</p>

    {% if remaining_seconds %}
        <p><strong>OTP expires in:</strong> {{ remaining_seconds }} seconds</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label>OTP</label>
        <input type="text" name="otp" maxlength="5" required>

        <button class="btn" type="submit" style="width:100%;margin-top:18px;">Verify Account</button>
    </form>

    <p class="muted">
        <a href="{% url 'resend_otp' role email %}">Resend OTP</a>
    </p>
</div>
{% endblock %}
